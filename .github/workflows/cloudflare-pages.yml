name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN が空です。GitHub Secrets に設定してください。"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID が空です。GitHub Secrets に設定してください。"
            exit 1
          fi
          echo "Cloudflare Secrets は設定済みです（値は表示しません）"

      - name: Prepare Pages artifact
        env:
          FCTZS_SITE_URL: ${{ vars.FCTZS_SITE_URL }}
          FCTZS_AUTH_REDIRECT_URL: ${{ vars.FCTZS_AUTH_REDIRECT_URL }}
          FCTZS_API_BASE: ${{ vars.FCTZS_API_BASE }}
          FCTZS_SUPABASE_PROJECT_ID: ${{ vars.FCTZS_SUPABASE_PROJECT_ID }}
          FCTZS_R2_PUBLIC_URL: ${{ vars.FCTZS_R2_PUBLIC_URL }}
        run: node scripts/prepare-pages.mjs

      - name: Verify dist exists
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html がありません"; exit 1; }
          ls -la dist | head -n 30

      # 公開URLが *.workers.dev のため Pages ではなく Worker 静的アセットでデプロイする。
      - name: Publish frontend Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.24.3"
          command: deploy --config wrangler.frontend.toml
