name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare Pages artifact
        env:
          # Cloudflare Pages の本番URLに合わせて Repository Variables を設定する。
          FCTZS_SITE_URL: ${{ vars.FCTZS_SITE_URL }}
          FCTZS_AUTH_REDIRECT_URL: ${{ vars.FCTZS_AUTH_REDIRECT_URL }}
          FCTZS_API_BASE: ${{ vars.FCTZS_API_BASE }}
          FCTZS_SUPABASE_PROJECT_ID: ${{ vars.FCTZS_SUPABASE_PROJECT_ID }}
          FCTZS_R2_PUBLIC_URL: ${{ vars.FCTZS_R2_PUBLIC_URL }}
        run: node scripts/prepare-pages.mjs

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 初回は Cloudflare Dashboard で Pages プロジェクトを作成し、名前を合わせる。
          command: pages deploy dist --project-name=fctzs
