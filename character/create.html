<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新規作成 | FCTZS TRPG部</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>キャラクター新規作成</h1>

    <form id="character-form">
        <label>名前</label>
        <input name="name" required>

        <label>プレイヤー</label>
        <input name="player">

        <div class="form-group"></div>
            <label>システム</label>
            <select name="system" id="system-select" required>
                <option value="">選択してください</option>
                <option value="CoC6">クトゥルフ神話TRPG(6版)</option>
                <option value="CoC7">新クトゥルフ神話TRPG(7版)</option>
                <option value="エモクロアTRPG">エモクロアTRPG</option>
            </select>
        </div>

        <div id="dynamic-fields"></div>

        <label>職業</label>
        <input name="job">

        <label>年齢</label>
        <input name="age" type="number">

        <label>性別</label>
        <input name="gender">

        <label>身長</label>
        <input name="height" type="number">

        <label>体重</label>
        <input name="weight" type="number">

        <label>出身</label>
        <input name="origin">

        <label>メモ</label>
        <textarea name="memo"></textarea>


        <button type="submit">作成</button>
    </form>
    <footer>
            <hr />
            <small><a href="../character/index.html">Back</a></small>
    </footer>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/character_create.js"></script>

</body>
</html>
