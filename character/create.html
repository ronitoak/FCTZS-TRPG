<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新規作成 | FCTZS TRPG部</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>キャラクター新規作成</h1>

    <form id="character-form">
    <fieldset class="form-section">
        <legend>プロフィール</legend>
        <div class="profile-grid">
            <div class="form-group"><label>名前</label><input type="text" name="name" required class="form-control"></div>
            <div class="form-group"><label>職業</label><input type="text" name="job" class="form-control"></div>
            <div class="form-group"><label>年齢</label><input type="number" name="age" class="form-control"></div>
            <div class="form-group"><label>性別</label><input type="text" name="gender" class="form-control"></div>
            <div class="form-group"><label>身長</label><input type="number" name="height" class="form-control"></div>
            <div class="form-group"><label>体重</label><input type="number" name="weight" class="form-control"></div>
            <div class="form-group"><label>出身</label><input type="text" name="origin" class="form-control"></div>
            <div class="form-group"><label>プレイヤー</label><input type="text" name="player" class="form-control"></div>
            <div class="form-group">
                <label>システム</label>
                <select name="system" id="system-select" required>
                    <option value="">選択してください</option>
                    <option value="CoC6">クトゥルフ神話TRPG(6版)</option>
                    <option value="CoC7">新クトゥルフ神話TRPG(7版)</option>
                    <option value="エモクロアTRPG">エモクロアTRPG</option>
                </select>
            </div>
        </div>
    </fieldset>

    <div id="dynamic-fields-container"></div>

    <fieldset class="form-section">
        <div class="form-group">
        <label>メモ</label>
        <textarea name="memo" rows="5"></textarea>
        </div>
    </fieldset>

    <button type="submit">キャラクターを作成</button>
    </form>

    <footer>
            <hr />
            <small><a href="../character/index.html">Back</a></small>
    </footer>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/character_create.js"></script>

</body>
</html>
