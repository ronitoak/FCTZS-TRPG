<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Characters | FCTZS TRPG部</title>
    <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
        <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
        <nav id="common-nav" class="top-nav"></nav>
        <hr />
        <h1 style="display: flex; justify-content: space-between; align-items: center;">
            <span>キャラクター一覧</span>
            <a href="./create.html" class="btn-primary" style="font-size: 14px; font-weight: bold;">新規追加</a>
        </h1>

        <!-- 一覧の検索条件：character.js が選択肢を補完し、条件に応じて再描画 -->
        <div class="filter-controls">
            <select id="filter-system">
                <option value="">システム</option>
            </select>

            <select id="filter-player">
                <option value="">プレイヤー</option>
                </select>

            <select id="filter-scenario">
                <option value="">通過シナリオ</option>
                </select>

            <select id="filter-state">
                <option value="">状態</option>
                <option value="survived">生存</option>
                <option value="lost">ロスト</option>
            </select>

            <input type="text" id="filter-keyword" placeholder="名前・PL名で検索...">

            <button id="search-button">検索</button>
        </div>

        <!-- キャラクターカード一覧：character.js の主要な描画先 -->
        <section id="character-list">
            <p>読み込み中…</p>
        </section>

        <footer>
                <hr />
                <small><a href="../index.html">Back to Home</a></small>
        </footer>
     </div>
       <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/init-supabase.js"></script>
    <script src="../js/site-config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/character.js"></script>
</body>
</html>
