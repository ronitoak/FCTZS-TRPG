<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightreign Build Simulator</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .card { background: #2a2a2a; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #444; }
        select, button { padding: 8px; border-radius: 4px; background: #333; color: white; border: 1px solid #555; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .status-item { background: #333; padding: 10px; border-radius: 4px; text-align: center; }
        .status-label { font-size: 0.8rem; color: #aaa; display: block; }
        .status-value { font-size: 1.2rem; font-weight: bold; }
        .slot-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #555;
            display: inline-block;
        }
        .bg-red { background-color: #ff4d4d; }
        .bg-blue { background-color: #4d79ff; }
        .bg-yellow { background-color: #ffcc00; }
        .bg-green { background-color: #2eb82e; }
        .bg-white { background-color: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .slot-dot {
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .slot-dot:hover {
            transform: scale(1.2);
            border-color: #fff;
        }
        /* 装備済みスロットの強調 */
        .slot-equipped {
            border: 2px solid white !important;
            box-shadow: 0 0 8px currentColor;
        }
        /* スタイルの追加・微調整 */
        #equipped-effects-summary ul li {
            margin-bottom: 5px;
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
        }
        #equipped-effects-summary strong {
            color: #ffcc00; /* 遺物名を少し目立たせる */
        }
        #effect-list-normal li, #effect-list-deep li {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            min-height: 1.2em; /* 空行でも高さを維持 */
        }
        /* 文頭に・（中黒）を自動付与 */
        #effect-list-normal li::before, #effect-list-deep li::before {
            content: "・";
            color: #666;
        }
    </style>
</head>
<body>

    <h1>ナイトレイン ビルドシミュレーター</h1>

    <div class="card">
        <h3>所持遺物の新規登録</h3>
        <div style="display: grid; gap: 10px;">
            <label>所有者:</label>
            <select id="relic-owner-reg">
                <option value="daruji">daruji</option>
                <option value="BK201">BK201</option>
                <option value="orcapanda">orcapanda</option>
            </select>
            <input type="text" id="relic-name" placeholder="遺物の名前（任意）">
            
            <select id="relic-color">
                <option value="赤">赤</option>
                <option value="青">青</option>
                <option value="黄">黄</option>
                <option value="緑">緑</option>
            </select>

            <label><input type="checkbox" id="relic-is-deep"> 深層遺物</label>

            <select id="relic-effect-1"><option value="">効果1を選択</option></select>
            <select id="relic-effect-2"><option value="">効果2を選択</option></select>
            <select id="relic-effect-3"><option value="">効果3を選択</option></select>

            <button onclick="saveRelic()">遺物を保存する</button>
        </div>
    </div>

    <div class="card">
        <label for="char-select">キャラクターを選択:</label>
        <select id="char-select">
            <option value="">読込中...</option>
        </select>

        <div id="preset-container" style="margin-top: 15px; display:none;">
            <label for="preset-select">スロット構成を選択:</label>
            <select id="preset-select">
                <option value="">選択してください</option>
            </select>
        </div>
    </div>

    <div id="slot-board" class="card" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0;">装備スロット</h3>
            <div>
                <label style="font-size: 0.8rem; color: #aaa;">遺物所有者:</label>
                <select id="owner-filter">
                    <option value="daruji">daruji</option>
                    <option value="BK201">BK201</option>
                    <option value="orcapanda">orcapanda</option>
                </select>
            </div>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div style="flex: 0 1 auto;">
                <div style="margin-bottom: 10px;">
                    <p style="font-size: 0.8rem; color: #aaa; margin: 5px 0;">通常遺物</p>
                    <div id="normal-slots" style="display: flex; gap: 10px;"></div>
                    <p style="font-size: 0.8rem; color: #aaa; margin: 5px 0;">深層遺物</p>
                    <div id="deep-slots" style="display: flex; gap: 10px;"></div>
                </div>
            </div>

            <div style="display: flex; gap: 40px; min-height: 200px;">
                <div style="flex: 1;">
                    <p style="font-size: 0.75rem; color: #888; border-bottom: 1px solid #333; padding-bottom: 5px;">通常遺物効果</p>
                    <ul id="effect-list-normal" style="list-style: none; padding: 0; margin: 0; font-size: 0.9rem; color: #bbb;">
                        </ul>
                </div>
                
                <div style="flex: 1;">
                    <p style="font-size: 0.75rem; color: #888; border-bottom: 1px solid #333; padding-bottom: 5px;">深層遺物効果</p>
                    <ul id="effect-list-deep" style="list-style: none; padding: 0; margin: 0; font-size: 0.9rem; color: #bbb;">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div id="status-board" class="card" style="display:none;">
        <h2 id="selected-char-name">キャラクター名</h2>
        <div class="status-grid">
            <div class="status-item"><span class="status-label">HP</span><span class="status-value" id="val-hp">-</span></div>
            <div class="status-item"><span class="status-label">FP</span><span class="status-value" id="val-fp">-</span></div>
            <div class="status-item"><span class="status-label">スタミナ</span><span class="status-value" id="val-stamina">-</span></div>
            <div class="status-item"><span class="status-label">筋力</span><span class="status-value" id="val-strength">-</span></div>
            <div class="status-item"><span class="status-label">技量</span><span class="status-value" id="val-dexterity">-</span></div>
            <div class="status-item"><span class="status-label">知力</span><span class="status-value" id="val-intelligence">-</span></div>
            <div class="status-item"><span class="status-label">信仰</span><span class="status-value" id="val-faith">-</span></div>
        </div>
        <div class="status-grid">
            <div class="status-item"><span class="status-label">物理攻撃力倍率</span><span class="status-value" id="val-multi-phys">1.00</span></div>
            <div class="status-item"><span class="status-label">魔力攻撃力倍率</span><span class="status-value" id="val-multi-magic">1.00</span></div>
            <div class="status-item"><span class="status-label">炎攻撃力倍率</span><span class="status-value" id="val-multi-fire">1.00</span></div>
            <div class="status-item"><span class="status-label">雷攻撃力倍率</span><span class="status-value" id="val-multi-lightning">1.00</span></div>
            <div class="status-item"><span class="status-label">聖攻撃力倍率</span><span class="status-value" id="val-multi-holy">1.00</span></div>
        </div>
    </div>

    <div id="relic-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="card" style="width:90%; max-width:500px; max-height:80vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="modal-title">遺物を選択</h3>
                <button onclick="closeModal()">×</button>
            </div>
            <div id="relic-list-container" style="display:grid; gap:10px; margin-top:10px;">
                </div>
        </div>
    </div>

    <script src="./js/utils.js"></script>
    <script>
        // --- 状態管理 ---
        let characters = [];
        let presets = [];
        let relicEffects = [];
        let allUserRelics = [];
        let equippedRelics = [null, null, null, null, null, null]; 
        let currentTargetSlotIndex = null;

        const colorMap = { '赤': 'bg-red', '青': 'bg-blue', '黄': 'bg-yellow', '緑': 'bg-green', '白': 'bg-white' };

        // --- 初期化処理 ---
        async function init() {
            try {
                const [charData, effectData] = await Promise.all([
                    Utils.apiGet("nightreign/characters"),
                    Utils.apiGet("nightreign/relic_effects")
                ]);
                characters = charData;
                relicEffects = effectData;

                const select = document.getElementById('char-select');
                select.innerHTML = '<option value="">選択してください</option>';
                characters.forEach(char => {
                    const opt = document.createElement('option');
                    opt.value = char.id; opt.textContent = char.character_name;
                    select.appendChild(opt);
                });

                fillEffectSelects();
                await loadUserRelics();
            } catch (err) {
                console.error("初期化失敗:", err);
            }
        }

        async function loadUserRelics() {
            allUserRelics = await Utils.apiGet("nightreign/user_relics");
        }

        function fillEffectSelects() {
            ['relic-effect-1', 'relic-effect-2', 'relic-effect-3'].forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = '<option value="">効果なし</option>';
                let currentCat = "";
                relicEffects.forEach(eff => {
                    if (currentCat !== eff.category) {
                        const group = document.createElement('optgroup');
                        group.label = `--- ${eff.category} ---`;
                        select.appendChild(group);
                        currentCat = eff.category;
                    }
                    const opt = document.createElement('option');
                    opt.value = eff.id; opt.textContent = eff.effect_name;
                    select.appendChild(opt);
                });
            });
        }

        // --- 装備・計算メインロジック ---
        function updateCalculations() {
            const charId = document.getElementById('char-select').value;
            const char = characters.find(c => c.id === charId);
            if (!char) return;

            document.getElementById('status-board').style.display = 'block';

            let stats = { 
                hp: char.hp, fp: char.fp, stamina: char.stamina, 
                strength: char.strength, dexterity: char.dexterity, 
                intelligence: char.intelligence, faith: char.faith 
            };
            let multi = { phys: 1.0, magic: 1.0, fire: 1.0, lightning: 1.0, holy: 1.0 };

            // 効果テキスト格納用
            let normalEffects = [];
            let deepEffects = [];

            equippedRelics.forEach((relic, index) => {
                if (!relic) return;

                let currentEffArray = (index < 3) ? normalEffects : deepEffects;

                [relic.effect_1_id, relic.effect_2_id, relic.effect_3_id].forEach(id => {
                    const eff = relicEffects.find(e => e.id === id);
                    if (!eff) return;

                    // リスト表示用に効果名を追加
                    currentEffArray.push(eff.effect_name);

                    // 数値計算
                    const val = Number(eff.base_value || 0);
                    if (eff.is_multiplier) {
                        const mVal = Number(eff.base_value || 1);
                        if (eff.affects_physical) multi.phys *= mVal;
                        if (eff.affects_magic) multi.magic *= mVal;
                        if (eff.affects_fire) multi.fire *= mVal;
                        if (eff.affects_lightning) multi.lightning *= mVal;
                        if (eff.affects_holy) multi.holy *= mVal;
                        if (eff.affected_status && stats[eff.affected_status]) stats[eff.affected_status] *= mVal;
                    } else {
                        if (eff.affected_status) stats[eff.affected_status] += val;
                        if (eff.affected_status_2) stats[eff.affected_status_2] += Number(eff.base_value_2 || 0);
                    }
                });
            });

            // --- UI反映 ---
            // ステータス数値
            Object.keys(stats).forEach(key => {
                const el = document.getElementById(`val-${key}`);
                if (el) el.textContent = Math.floor(stats[key]);
            });

            // 倍率表示
            ['phys', 'magic', 'fire', 'lightning', 'holy'].forEach(k => {
                const el = document.getElementById(`val-multi-${k}`);
                if (el) el.textContent = multi[k].toFixed(2);
            });

            // 効果リストの描画
            const renderEffectList = (elementId, effects) => {
                const el = document.getElementById(elementId);
                el.innerHTML = '';
                // 常に最大9行分確保するとレイアウトが安定します
                for (let i = 0; i < 9; i++) {
                    const li = document.createElement('li');
                    li.textContent = effects[i] || ''; // 効果がない行は空
                    if (!effects[i]) li.style.border = 'none'; // 空行の線は消す
                    el.appendChild(li);
                }
            };

            renderEffectList('effect-list-normal', normalEffects);
            renderEffectList('effect-list-deep', deepEffects);

            if (document.getElementById('preset-select').value) {
                refreshSlotUI();
            }
        }
        const charId = document.getElementById('char-select').value;
        const char = characters.find(c => c.id === charId);
        if (!char) return;

        document.getElementById('status-board').style.display = 'block';

        let stats = { 
            hp: char.hp, fp: char.fp, stamina: char.stamina, 
            strength: char.strength, dexterity: char.dexterity, 
            intelligence: char.intelligence, faith: char.faith 
        };
        let multi = { phys: 1.0, magic: 1.0, fire: 1.0, lightning: 1.0, holy: 1.0 };
        
        // 効果テキストを蓄積する配列
        let effectTexts = [];

        const activeRelics = equippedRelics.filter(r => r);

        activeRelics.forEach(relic => {
            let relicDesc = `<strong>${relic.custom_name}:</strong> `;
            let relicEffs = [];

            [relic.effect_1_id, relic.effect_2_id, relic.effect_3_id].forEach(id => {
                const eff = relicEffects.find(e => e.id === id);
                if (!eff) return;

                relicEffs.push(eff.effect_name);

                const val = Number(eff.base_value || 0);
                if (eff.is_multiplier) {
                    const mVal = Number(eff.base_value || 1);
                    if (eff.affects_physical) multi.phys *= mVal;
                    if (eff.affects_magic) multi.magic *= mVal;
                    if (eff.affects_fire) multi.fire *= mVal;
                    if (eff.affects_lightning) multi.lightning *= mVal;
                    if (eff.affects_holy) multi.holy *= mVal;
                    if (eff.affected_status && stats[eff.affected_status]) stats[eff.affected_status] *= mVal;
                } else {
                    if (eff.affected_status) stats[eff.affected_status] += val;
                    if (eff.affected_status_2) stats[eff.affected_status_2] += Number(eff.base_value_2 || 0);
                }
            });
            effectTexts.push(relicDesc + relicEffs.join(' / '));
        });

        // --- UI反映 ---
        // ステータス数値
        Object.keys(stats).forEach(key => {
            const el = document.getElementById(`val-${key}`);
            if (el) el.textContent = Math.floor(stats[key]);
        });

        // 倍率
        const multiMap = { 'phys': 'phys', 'magic': 'magic', 'fire': 'fire', 'lightning': 'lightning', 'holy': 'holy' };
        Object.keys(multiMap).forEach(k => {
            const el = document.getElementById(`val-multi-${k}`);
            if (el) el.textContent = multi[k].toFixed(2);
        });

        // ★追加：右側の「適用効果一覧」の更新
        const summaryEl = document.getElementById('equipped-effects-summary');
        if (effectTexts.length > 0) {
            summaryEl.innerHTML = '<ul style="padding-left: 20px; margin: 0;">' + 
                effectTexts.map(t => `<li>${t}</li>`).join('') + 
                '</ul>';
        } else {
            summaryEl.innerHTML = '<p style="color: #666;">遺物を装備するとここに詳細が表示されます</p>';
        }

        if (document.getElementById('preset-select').value) {
            refreshSlotUI();
        }
    }

        function refreshSlotUI() {
            const presetId = document.getElementById('preset-select').value;
            const preset = presets.find(p => p.id === presetId);
            if (!preset) return;

            // ここで親要素を確実に表示
            document.getElementById('slot-board').style.display = 'block';

            renderSlots('normal-slots', [preset.normal_slot_1, preset.normal_slot_2, preset.normal_slot_3], false);
            renderSlots('deep-slots', [preset.deep_slot_1, preset.deep_slot_2, preset.deep_slot_3], true);
        }

        function renderSlots(containerId, colors, isDeep) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            colors.forEach((c, i) => {
                const slotIdx = isDeep ? i + 3 : i;
                const dot = document.createElement('div');
                const isEquipped = !!equippedRelics[slotIdx];
                dot.className = `slot-dot ${colorMap[c] || 'bg-white'} ${isEquipped ? 'slot-equipped' : ''}`;
                dot.onclick = () => openRelicModal(slotIdx, c, isDeep);
                container.appendChild(dot);
            });
        }

        // --- 遺物選択・保存 ---

        function selectRelic(relic) {
            equippedRelics[currentTargetSlotIndex] = relic;
            closeModal();
            updateCalculations();
        }

        async function saveRelic() {
            const payload = {
                owner_name: document.getElementById('relic-owner-reg').value,
                custom_name: document.getElementById('relic-name').value,
                relic_color: document.getElementById('relic-color').value,
                is_deep_relic: document.getElementById('relic-is-deep').checked,
                effect_1_id: document.getElementById('relic-effect-1').value || null,
                effect_2_id: document.getElementById('relic-effect-2').value || null,
                effect_3_id: document.getElementById('relic-effect-3').value || null,
                penalty_status: null, penalty_value: 0
            };

            if (!payload.custom_name) return alert("名前を入力してください");

            try {
                await Utils.apiPost("nightreign/user_relics", payload);
                alert("登録しました！");
                await loadUserRelics();
            } catch (err) { console.error(err); alert("保存失敗"); }
        }

        function openRelicModal(index, slotColor, isDeep) {
            currentTargetSlotIndex = index;
            const owner = document.getElementById('owner-filter').value;
            const modal = document.getElementById('relic-modal');
            modal.style.display = 'flex';

            const container = document.getElementById('relic-list-container');
            document.getElementById('modal-title').textContent = `${slotColor}スロット選択 (${owner})`;
            
            const filtered = allUserRelics.filter(r => 
                r.owner_name === owner && 
                (slotColor === '白' || r.relic_color === slotColor) && 
                r.is_deep_relic === isDeep
            );

            container.innerHTML = '';
            
            const clearBtn = document.createElement('button');
            clearBtn.textContent = "--- 装備解除 ---";
            clearBtn.style.marginBottom = "10px";
            clearBtn.onclick = () => selectRelic(null);
            container.appendChild(clearBtn);

            if (filtered.length === 0) {
                container.innerHTML += '<p style="font-size:0.8rem; color:#aaa;">該当する遺物がありません。</p>';
            }

            filtered.forEach(relic => {
                const btn = document.createElement('button');
                btn.style.textAlign = "left";
                btn.style.width = "100%";
                btn.style.marginBottom = "5px";
                btn.innerHTML = `<strong>${relic.custom_name}</strong><br><small style="color:#bbb;">${getEffectNames(relic)}</small>`;
                btn.onclick = () => selectRelic(relic);
                container.appendChild(btn);
            });
        }

        function getEffectNames(relic) {
            return [relic.effect_1_id, relic.effect_2_id, relic.effect_3_id]
                .map(id => relicEffects.find(e => e.id === id)?.effect_name)
                .filter(n => n).join(' / ') || '効果なし';
        }

        function closeModal() { document.getElementById('relic-modal').style.display = 'none'; }

        // --- イベントリスナー ---

        document.getElementById('char-select').addEventListener('change', async (e) => {
            const charId = e.target.value;
            if (!charId) return;

            equippedRelics = [null, null, null, null, null, null];
            updateCalculations();

            try {
                presets = await Utils.apiGet(`nightreign/slot_presets?character_id=${charId}`);
                const pSelect = document.getElementById('preset-select');
                pSelect.innerHTML = '<option value="">選択してください</option>';
                presets.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id; opt.textContent = p.preset_name;
                    pSelect.appendChild(opt);
                });
                document.getElementById('preset-container').style.display = 'block';
                document.getElementById('slot-board').style.display = 'none'; // 新しいキャラの時は一度隠す
            } catch (err) { console.error(err); }
        });

        document.getElementById('preset-select').addEventListener('change', () => {
            refreshSlotUI();
        });

        init();
    </script>
</body>
</html>
