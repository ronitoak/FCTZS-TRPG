<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightreign Build Simulator</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .card { background: #2a2a2a; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #444; }
        select, button { padding: 8px; border-radius: 4px; background: #333; color: white; border: 1px solid #555; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .status-item { background: #333; padding: 10px; border-radius: 4px; text-align: center; }
        .status-label { font-size: 0.8rem; color: #aaa; display: block; }
        .status-value { font-size: 1.2rem; font-weight: bold; }
        .slot-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #555;
            display: inline-block;
        }
        .bg-red { background-color: #ff4d4d; }
        .bg-blue { background-color: #4d79ff; }
        .bg-yellow { background-color: #ffcc00; }
        .bg-green { background-color: #2eb82e; }
        .bg-white { background-color: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .slot-dot {
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .slot-dot:hover {
            transform: scale(1.2);
            border-color: #fff;
        }
        /* 装備済みスロットの強調 */
        .slot-equipped {
            border: 2px solid white !important;
            box-shadow: 0 0 8px currentColor;
        }
    </style>
</head>
<body>

    <h1>ナイトレイン ビルドシミュレーター</h1>

    <div class="card">
        <h3>所持遺物の新規登録</h3>
        <div style="display: grid; gap: 10px;">
            <label>所有者:</label>
            <select id="relic-owner-reg">
                <option value="daruji">daruji</option>
                <option value="BK201">BK201</option>
                <option value="orcapanda">orcapanda</option>
            </select>
            <input type="text" id="relic-name" placeholder="遺物の名前（任意）">
            
            <select id="relic-color">
                <option value="赤">赤</option>
                <option value="青">青</option>
                <option value="黄">黄</option>
                <option value="緑">緑</option>
            </select>

            <label><input type="checkbox" id="relic-is-deep"> 深層遺物</label>

            <select id="relic-effect-1"><option value="">効果1を選択</option></select>
            <select id="relic-effect-2"><option value="">効果2を選択</option></select>
            <select id="relic-effect-3"><option value="">効果3を選択</option></select>

            <button onclick="saveRelic()">遺物を保存する</button>
        </div>
    </div>

    <div class="card">
        <label for="char-select">キャラクターを選択:</label>
        <select id="char-select">
            <option value="">読込中...</option>
        </select>

        <div id="preset-container" style="margin-top: 15px; display:none;">
            <label for="preset-select">スロット構成を選択:</label>
            <select id="preset-select">
                <option value="">選択してください</option>
            </select>
        </div>
    </div>

    <div id="slot-board" class="card" style="display:none;">
        <h3>装備スロット</h3>
        <div style="display: flex; gap: 20px;">
            <div>
                <p style="font-size: 0.8rem; color: #aaa;">通常遺物</p>
                <div id="normal-slots" style="display: flex; gap: 10px;"></div>
            </div>
            <div>
                <p style="font-size: 0.8rem; color: #aaa;">深層遺物</p>
                <div id="deep-slots" style="display: flex; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <hr>

    <div class="card">
        <h3>ビルド編集</h3>
        <label>表示する遺物の所有者:</label>
        <select id="owner-filter">
            <option value="daruji">daruji</option>
            <option value="BK201">BK201</option>
            <option value="orcapanda">orcapanda</option>
        </select>
    </div>

    <div id="status-board" class="card" style="display:none;">
        <h2 id="selected-char-name">キャラクター名</h2>
        <div class="status-grid">
            <div class="status-item"><span class="status-label">HP</span><span class="status-value" id="val-hp">-</span></div>
            <div class="status-item"><span class="status-label">FP</span><span class="status-value" id="val-fp">-</span></div>
            <div class="status-item"><span class="status-label">スタミナ</span><span class="status-value" id="val-stamina">-</span></div>
            <div class="status-item"><span class="status-label">筋力</span><span class="status-value" id="val-strength">-</span></div>
            <div class="status-item"><span class="status-label">技量</span><span class="status-value" id="val-dexterity">-</span></div>
            <div class="status-item"><span class="status-label">知力</span><span class="status-value" id="val-intelligence">-</span></div>
            <div class="status-item"><span class="status-label">信仰</span><span class="status-value" id="val-faith">-</span></div>
            </div>
    </div>

    <div id="relic-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="card" style="width:90%; max-width:500px; max-height:80vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="modal-title">遺物を選択</h3>
                <button onclick="closeModal()">×</button>
            </div>
            <div id="relic-list-container" style="display:grid; gap:10px; margin-top:10px;">
                </div>
        </div>
    </div>

    <script src="./js/utils.js"></script>
    <script>
        
        // --- 設定 ---
        let characters = [];
        let presets = []; // ★追加: プリセット保持用
        let relicEffects = []; // 効果マスタを保持する変数

        async function fetchCharacters() {
            try {
                // キャラクターと効果マスタを同時に取得
                const [charData, effectData] = await Promise.all([
                    Utils.apiGet("nightreign/characters"),
                    Utils.apiGet("nightreign/relic_effects")
                ]);
                
                characters = charData;
                relicEffects = effectData;
                
                // キャラクターセレクトの生成（既存通り）
                const select = document.getElementById('char-select');
                select.innerHTML = '<option value="">選択してください</option>';
                characters.forEach(char => {
                    const opt = document.createElement('option');
                    opt.value = char.id;
                    opt.textContent = char.character_name;
                    select.appendChild(opt);
                });

                // ★追加: 遺物登録用の効果セレクトボックスを生成
                fillEffectSelects();

            } catch (err) {
                console.error("データ取得失敗:", err);
            }
        }

        // 効果セレクトボックスにマスタデータを流し込む関数
        function fillEffectSelects() {
            const effectSelectIds = ['relic-effect-1', 'relic-effect-2', 'relic-effect-3'];
            
            effectSelectIds.forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = '<option value="">効果なし</option>';
                
                // カテゴリごとにグルーピングして表示すると選びやすくなります
                let currentCategory = "";
                relicEffects.forEach(eff => {
                    if (currentCategory !== eff.category) {
                        const group = document.createElement('optgroup');
                        group.label = `--- ${eff.category} ---`;
                        select.appendChild(group);
                        currentCategory = eff.category;
                    }
                    const opt = document.createElement('option');
                    opt.value = eff.id;
                    opt.textContent = eff.effect_name;
                    select.appendChild(opt);
                });
            });
        }

        // 装備中の遺物から効果を合計する関数のイメージ
        function calculateTotalStats(equippedRelics) {
            let totalMultiplier = 1.0;
            let addStrength = 0;

            equippedRelics.forEach(relic => {
                // 効果1〜3をループ
                [relic.effect1, relic.effect2, relic.effect3].forEach(effect => {
                    if (!effect) return;

                    // 乗算かつ対象属性フラグが立っている場合のみ計算
                    if (effect.is_multiplier && effect.base_value > 0) {
                        totalMultiplier *= effect.base_value;
                    } 
                    // 加算（能力値）の場合
                    else if (!effect.is_multiplier && effect.affected_status === 'strength') {
                        addStrength += effect.base_value;
                    }
                    // それ以外（フラグがfalseやvalueが0）は、このif文を通り抜けるので自動的に無視される
                });
            });

            return { totalMultiplier, addStrength };
        }

        async function saveRelic() {
            const owner = document.getElementById('relic-owner-reg').value;
            const name = document.getElementById('relic-name').value;
            const color = document.getElementById('relic-color').value;
            const isDeep = document.getElementById('relic-is-deep').checked;
            const e1 = document.getElementById('relic-effect-1').value;
            const e2 = document.getElementById('relic-effect-2').value;
            const e3 = document.getElementById('relic-effect-3').value;

            if (!name) {
                alert("管理用の名前を入力してください");
                return;
            }

            const payload = {
                owner_name: owner,         // ★追加
                custom_name: name,
                relic_color: color,
                is_deep_relic: isDeep,
                effect_1_id: e1 || null,
                effect_2_id: e2 || null,
                effect_3_id: e3 || null,
                // デメリット（penalty）については必要に応じて追加してください
                penalty_status: null,
                penalty_value: 0
            };

            try {
                const res = await Utils.apiPost("nightreign/user_relics", payload);
                console.log("保存成功:", res);
                alert(`${owner} の遺物として登録しました！`);
                
                // 入力欄をクリア
                document.getElementById('relic-name').value = '';
                document.getElementById('relic-color').value = '';
                document.getElementById('relic-is-deep').checked = false;
                document.getElementById('relic-effect-1').value = '';
                document.getElementById('relic-effect-2').value = '';
                document.getElementById('relic-effect-3').value = '';

                // 登録後に所持一覧を再取得する処理をここに入れるとスムーズです
            } catch (err) {
                console.error("保存失敗:", err);
                alert("保存に失敗しました。");
            }
        }

        let allUserRelics = []; // DBから取得した全遺物
        let equippedRelics = [null, null, null, null, null, null]; // 0-2:通常, 3-5:深層
        let currentTargetSlotIndex = null;

        // 起動時や保存時に呼び出して遺物リストを更新しておく
        async function loadUserRelics() {
            try {
                allUserRelics = await Utils.apiGet("nightreign/user_relics");
                console.log("所持遺物ロード完了:", allUserRelics.length, "件");
            } catch (err) {
                console.error("遺物ロード失敗:", err);
            }
        }

        // スロットクリックイベントの登録（renderSlots関数内を修正）
        function renderSlots(containerId, colors, isDeep) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            colors.forEach((c, i) => {
                const slotIndex = isDeep ? i + 3 : i;
                const dot = document.createElement('div');
                dot.className = `slot-dot ${colorMap[c]}`;
                dot.dataset.color = c;
                dot.dataset.index = slotIndex;
                dot.title = `${c}スロット (クリックして装備)`;
                
                // クリックでモーダルを開く
                dot.onclick = () => openRelicModal(slotIndex, c, isDeep);
                
                container.appendChild(dot);
            });
        }

        // モーダルを開く
        function openRelicModal(index, slotColor, isDeep) {
            currentTargetSlotIndex = index;
            const owner = document.getElementById('owner-filter').value;
            const modal = document.getElementById('relic-modal');
            const listContainer = document.getElementById('relic-list-container');
            
            document.getElementById('modal-title').textContent = `${slotColor}スロットの遺物選択 (${owner})`;
            listContainer.innerHTML = '';

            // フィルタリング: 所有者一致 ＆ 色一致(または白) ＆ 深層区分一致
            const filtered = allUserRelics.filter(r => {
                const ownerMatch = r.owner_name === owner;
                const colorMatch = (slotColor === '白' || r.relic_color === slotColor);
                const deepMatch = r.is_deep_artifact === isDeep;
                return ownerMatch && colorMatch && deepMatch;
            });

            if (filtered.length === 0) {
                listContainer.innerHTML = '<p>該当する遺物がありません。登録してください。</p>';
            }

            // 解除ボタン
            const clearBtn = document.createElement('button');
            clearBtn.textContent = "--- 装備解除 ---";
            clearBtn.onclick = () => selectRelic(null);
            listContainer.appendChild(clearBtn);

            filtered.forEach(relic => {
                const btn = document.createElement('button');
                btn.style.textAlign = "left";
                btn.innerHTML = `
                    <strong>${relic.custom_name || '無名の遺物'}</strong><br>
                    <small>${getEffectNames(relic)}</small>
                `;
                btn.onclick = () => selectRelic(relic);
                listContainer.appendChild(btn);
            });

            modal.style.display = 'flex';
        }

        // 遺物内の効果名を取得する補助関数
        function getEffectNames(relic) {
            const names = [];
            [relic.effect_1_id, relic.effect_2_id, relic.effect_3_id].forEach(id => {
                if (!id) return;
                const eff = relicEffects.find(e => e.id === id);
                if (eff) names.push(eff.effect_name);
            });
            return names.join(' / ') || '効果なし';
        }

        function selectRelic(relic) {
            equippedRelics[currentTargetSlotIndex] = relic;
            closeModal();
            console.log("現在の装備構成:", equippedRelics);
            
            // ここで計算関数を呼び出す（次回実装）
            // updateCalculations(); 
        }

        function closeModal() {
            document.getElementById('relic-modal').style.display = 'none';
        }

        // 初期化時にロード
        window.addEventListener('DOMContentLoaded', () => {
            loadUserRelics();
        });

        // スロットクリック時に呼ばれる関数（仮）
        function openRelicSelector(slotColor) {
            const currentOwner = document.getElementById('owner-filter').value;
            
            // 「所有者が一致」かつ「色が一致（またはスロットが白）」する遺物だけを抽出
            const availableRelics = allUserRelics.filter(r => {
                const ownerMatch = r.owner_name === currentOwner;
                const colorMatch = (slotColor === '白' || r.relic_color === slotColor);
                return ownerMatch && colorMatch;
            });

            console.log("選択可能な遺物:", availableRelics);
            // ここでポップアップやリストを表示して選択させる処理へ
        }

        // キャラ選択時の処理をアップデート
        document.getElementById('char-select').addEventListener('change', async (e) => {
            const charId = e.target.value;
            const char = characters.find(c => c.id === charId);
            if (!char) return;

            document.getElementById('status-board').style.display = 'block';
            document.getElementById('selected-char-name').textContent = char.character_name;
            
            // ステータス反映（既存）
            document.getElementById('val-hp').textContent = char.hp;
            document.getElementById('val-fp').textContent = char.fp;
            document.getElementById('val-stamina').textContent = char.stamina;
            document.getElementById('val-strength').textContent = char.strength;
            document.getElementById('val-dexterity').textContent = char.dexterity;
            document.getElementById('val-intelligence').textContent = char.intelligence;
            document.getElementById('val-faith').textContent = char.faith;

            // ★追加: プリセット（器・盃）の読み込み
            try {
                presets = await Utils.apiGet(`nightreign/slot_presets?character_id=${charId}`);
                const pSelect = document.getElementById('preset-select');
                pSelect.innerHTML = '<option value="">選択してください</option>';
                presets.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.preset_name;
                    pSelect.appendChild(opt);
                });
                document.getElementById('preset-container').style.display = 'block';
            } catch (err) {
                console.error("プリセット取得失敗", err);
            }
        });

        // ★追加: プリセット選択時にスロットの色を表示する
        document.getElementById('preset-select').addEventListener('change', (e) => {
            const preset = presets.find(p => p.id === e.target.value);
            if (!preset) return;

            document.getElementById('slot-board').style.display = 'block';
            
            const colorMap = { '赤': 'bg-red', '青': 'bg-blue', '黄': 'bg-yellow', '緑': 'bg-green', '白': 'bg-white' };

            const renderSlots = (containerId, colors) => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                colors.forEach(c => {
                    const dot = document.createElement('div');
                    dot.className = `slot-dot ${colorMap[c]}`;
                    dot.title = c;
                    container.appendChild(dot);
                });
            };

            renderSlots('normal-slots', [preset.normal_slot_1, preset.normal_slot_2, preset.normal_slot_3]);
            renderSlots('deep-slots', [preset.deep_slot_1, preset.deep_slot_2, preset.deep_slot_3]);
        });

        // 起動時に実行
        fetchCharacters();
    </script>
</body>
</html>
