<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Players | FCTZS TRPG部</title>
    <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
    <nav id="common-nav" class="top-nav"></nav>
    <hr />
    <header class="page-header">
      <h1>プレイヤー</h1>
    </header>

    <!-- プレイヤー選択導線：player.js が選択肢を読み込み詳細画面へ遷移 -->
    <select id="select-player">
        <option value="">プレイヤー</option>
    </select>
    <button id="select-button">移動</button>

    <!-- プレイヤー一覧領域：将来の一覧表示用に維持 -->
    <section id="player-list">
      <p>このページは本当に必要だろうか？</p>
      <!-- いや、いらない -->
      <!-- 選択UIを主導線としつつ、既存スクリプトの描画先契約を保つため領域を残す -->
    </section>

    <footer>
      <hr />
      <small><a href="../index.html">Back to Home</a></small>
    </footer>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/init-supabase.js"></script>
    <script src="../js/site-config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/player.js"></script>
</body>
</html>
