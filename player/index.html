<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Players | FCTZS TRPG部</title>
    <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
    <nav id="common-nav" class="top-nav"></nav>
    <hr />
    <header class="page-header">
      <h1>プレイヤー</h1>
      <p class="u-muted">部員名簿。カードを開くとプロフィール・予定・通過シナリオを確認できます。</p>
    </header>

    <!-- 検索・ジャンプ：player.js が名簿カードを絞り込み／詳細へ遷移 -->
    <div class="filter-controls player-roster-controls">
      <input type="text" id="filter-player-keyword" placeholder="名前で検索..." aria-label="プレイヤー名で検索">
      <select id="select-player" aria-label="プレイヤーを選択してジャンプ">
        <option value="">ジャンプ（一覧から選択）</option>
      </select>
      <button type="button" id="select-button">移動</button>
    </div>

    <!-- プレイヤー名簿カード：player.js が描画 -->
    <section id="player-list">
      <p>読み込み中…</p>
    </section>

    <footer>
      <hr />
      <small><a href="../index.html">Back to Home</a></small>
    </footer>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/init-supabase.js"></script>
    <script src="../js/site-config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/player.js"></script>
</body>
</html>
