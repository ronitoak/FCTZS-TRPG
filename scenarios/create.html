<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新規作成 | FCTZS TRPG部</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
   <div class="container">
        <nav class="top-nav">
            <a href="../index.html">Home</a> |
            <a href="../character/index.html">Characters</a> |
            <a href="../sessions/index.html">Sessions</a> |
            <a href="../scenarios/index.html">Scenarios</a> |
            <a href="../schedule/index.html">Schedule</a> |
            <a href="../bbs/index.html">BBS</a>
        </nav>
        <hr />
        <h1>シナリオ新規登録</h1>

        <form id="scenario-form">
            <fieldset class="form-section">
                <legend>基本情報</legend>
                <div class="profile-grid">
                    <div class="form-group">
                        <label>シナリオタイトル</label>
                        <input type="text" name="title" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>システム</label>
                        <select name="system" id="system-select" required class="form-control">
                            <option value="">選択してください</option>
                            <option value="CoC6">クトゥルフ神話TRPG(6版)</option>
                            <option value="CoC7">新クトゥルフ神話TRPG(7版)</option>
                            <option value="エモクロアTRPG">エモクロアTRPG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>作者 / サークル</label>
                        <input type="text" name="author" class="form-control" placeholder="(任意)">
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>詳細情報</legend>
                <div class="form-group">
                    <label>概要</label>
                    <textarea name="description" rows="8" class="form-control" placeholder="あらすじやハンドアウトを入力"></textarea>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>備考</label>
                    <textarea name="notes" rows="4" class="form-control" placeholder="URLやPLへの注意事項など"></textarea>
                </div>
            </fieldset>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-primary">シナリオを登録</button>
            </div>
        </form>
        <footer>
                <hr />
                <small><a href="../scenarios/index.html">Back</a></small>
        </footer>
    </div>
   <script src="../js/utils.js"></script>
    <script src="../js/scenario_create.js"></script>
</body>
</html>
