<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>シナリオ新規登録 | FCTZS TRPG部</title>
    <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
   <div class="container">
        <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
        <nav id="common-nav" class="top-nav"></nav>
        <hr />
        <h1>シナリオ新規登録</h1>

        <!-- シナリオ登録フォーム：scenario_create.js が画像プレビューと登録を制御 -->
        <form id="scenario-form">
            <fieldset class="form-section">
                <legend>シナリオ基本情報</legend>
                <div class="profile-grid">
                    <div class="form-group">
                        <label>タイトル</label>
                        <input type="text" name="title" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>システム</label>
                        <select name="system" id="system-select" required class="form-control">
                            <option value="">選択してください</option>
                            <option value="CoC6">クトゥルフ神話TRPG(6版)</option>
                            <option value="CoC7">新クトゥルフ神話TRPG(7版)</option>
                            <option value="エモクロアTRPG">エモクロアTRPG</option>
                            <option value="ガイアケアTRPG">ガイアケアTRPG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" name="author" class="form-control" placeholder="(任意)">
                    </div>
                    <div class="form-group">
                        <label>シナリオ画像</label>
                        <input type="file" id="image-file" accept="image/*" class="form-control">
                        <div id="image-preview-container" style="margin-top: 10px; display: none;">
                            <img id="image-preview" src="" style="max-width: 150px; max-height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>最小プレイ人数</label>
                        <input type="number" name="min_players" min="1" value="1" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>最大プレイ人数</label>
                        <input type="number" name="max_players" min="1" value="4" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>プレイ時間 (分)</label>
                        <input type="number" name="play_time_minutes" min="1" value="180" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>ロスト率</label>
                        <select name="lost_rate" required class="form-control">
                            <option value="low" selected>低 (low)</option>
                            <option value="mid">中 (mid)</option>
                            <option value="high">高 (high)</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>詳細情報</legend>

                <div class="form-group">
                    <label>基本情報</label>
                    <textarea name="notes" rows="4" class="form-control" placeholder="プレイ人数、プレイ時間、舞台設定など"></textarea>
                </div>
                <div class="form-group">
                    <label>イントロダクション</label>
                    <textarea name="description" rows="8" class="form-control" placeholder="あらすじやハンドアウトを入力"></textarea>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>プレイスタイル傾向（任意）</legend>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">展開軸</label>
                    <div class="trend-options" style="display: flex; gap: 15px;">
                        <label style="font-weight: normal;"><input type="radio" name="trend_story_chaos" value="story"> 物語重視</label>
                        <label style="font-weight: normal;"><input type="radio" name="trend_story_chaos" value="" checked> 指定なし</label>
                        <label style="font-weight: normal;"><input type="radio" name="trend_story_chaos" value="chaos"> 混沌歓迎</label>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">選択軸</label>
                    <div class="trend-options" style="display: flex; gap: 15px;">
                        <label style="font-weight: normal;"><input type="radio" name="trend_avatar_clear" value="avatar"> RP・没入</label>
                        <label style="font-weight: normal;"><input type="radio" name="trend_avatar_clear" value="" checked> 指定なし</label>
                        <label style="font-weight: normal;"><input type="radio" name="trend_avatar_clear" value="clear"> 攻略重視</label>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">立ち回り軸</label>
                    <div class="trend-options" style="display: flex; gap: 15px;">
                        <label style="font-weight: normal;"><input type="radio" name="trend_harmony_active" value="harmony"> 協調重視</label>
                        <label style="font-weight: normal;"><input type="radio" name="trend_harmony_active" value="" checked> 指定なし</label>
                        <label style="font-weight: normal;"><input type="radio" name="trend_harmony_active" value="active"> 活躍推奨</label>
                    </div>
                </div>
            </fieldset>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-primary">シナリオを登録</button>
            </div>
        </form>
        <footer>
                <hr />
                <small><a href="../scenarios/index.html">Back</a></small>
        </footer>
    </div>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/init-supabase.js"></script>
   <script src="../js/utils.js"></script>
    <script src="../js/scenario_create.js"></script>
</body>
</html>
