<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scenarios | FCTZS TRPG部</title>
    <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
    <div class="container">
        <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
        <nav id="common-nav" class="top-nav"></nav>
        <hr />
        <!-- シナリオ詳細本体：scenario_detail.js が概要・卓履歴・通過キャラクターを描画 -->
        <section id="scenario-detail">
          <p>読み込み中…</p>
        </section>
        <!-- シナリオ編集モーダル：scenario_detail.js が既存値の反映と更新を制御 -->
        <dialog id="edit-scenario-modal" class="modal">
            <div class="modal-content" style="max-width: 600px;">
                <h3>シナリオ情報の編集</h3>
                <form id="edit-scenario-form">
                <div class="form-group">
                    <label>タイトル</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>システム</label>
                    <input type="text" name="system" class="form-control">
                </div>
                <div class="form-group">
                    <label>作者</label>
                    <input type="text" name="author" class="form-control">
                </div>
                <div class="form-group">
                    <label>基本情報</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>概要</label>
                    <textarea name="description" class="form-control" rows="5"></textarea>
                </div>
                <div class="form-group">
                    <label>最小プレイ人数</label>
                    <input type="number" name="min_players" min="1" required class="form-control">
                </div>
                <div class="form-group">
                    <label>最大プレイ人数</label>
                    <input type="number" name="max_players" min="1" required class="form-control">
                </div>
                <div class="form-group">
                    <label>プレイ時間 (分)</label>
                    <input type="number" name="play_time_minutes" min="1" required class="form-control">
                </div>
                <div class="form-group">
                    <label>ロスト率</label>
                    <select name="lost_rate" required class="form-control">
                        <option value="low">低 (low)</option>
                        <option value="mid">中 (mid)</option>
                        <option value="high">高 (high)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label style="font-weight: bold;">プレイスタイル傾向（任意）</label>
                    <div style="margin-top: 10px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">展開軸</label>
                        <div class="trend-options" style="display: flex; gap: 15px;">
                            <label style="font-weight: normal;"><input type="radio" name="trend_story_chaos" value="story"> 物語重視</label>
                            <label style="font-weight: normal;"><input type="radio" name="trend_story_chaos" value=""> 指定なし</label>
                            <label style="font-weight: normal;"><input type="radio" name="trend_story_chaos" value="chaos"> 混沌歓迎</label>
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">選択軸</label>
                        <div class="trend-options" style="display: flex; gap: 15px;">
                            <label style="font-weight: normal;"><input type="radio" name="trend_avatar_clear" value="avatar"> RP・没入</label>
                            <label style="font-weight: normal;"><input type="radio" name="trend_avatar_clear" value=""> 指定なし</label>
                            <label style="font-weight: normal;"><input type="radio" name="trend_avatar_clear" value="clear"> 攻略重視</label>
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">立ち回り軸</label>
                        <div class="trend-options" style="display: flex; gap: 15px;">
                            <label style="font-weight: normal;"><input type="radio" name="trend_harmony_active" value="harmony"> 協調重視</label>
                            <label style="font-weight: normal;"><input type="radio" name="trend_harmony_active" value=""> 指定なし</label>
                            <label style="font-weight: normal;"><input type="radio" name="trend_harmony_active" value="active"> 主体推奨</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>シナリオ画像 (変更する場合のみ選択)</label>
                    <input type="file" name="image_file" accept="image/*" class="form-control">
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" id="btn-close-scenario-edit" class="btn-secondary">キャンセル</button>
                </div>
                </form>
            </div>
        </dialog>
        <!-- コメント欄：comments.js の描画先 -->
        <div id="comments-root"></div>
        <footer>
            <hr />
            <small><a href="../scenarios/index.html">Back</a></small>
        </footer>
    </div>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/init-supabase.js"></script>
    <script src="../js/site-config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/scenario_detail.js"></script>
    <script src="../js/comments.js"></script>
    <script>
        Comments.mount("comments-root", "scenario");
    </script>

</body>
</html>
