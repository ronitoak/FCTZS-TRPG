<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scenarios | FCTZS TRPG部</title>
  <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
    <nav id="common-nav" class="top-nav"></nav>
    <hr />
    <h1 style="display: flex; justify-content: space-between; align-items: center;">
        <span>シナリオ集</span>
        <a href="./create.html" class="btn-primary" style="font-size: 14px; font-weight: bold;">新規追加</a>
    </h1>
    <p>この部活動で遊んだシナリオたち</p>

    <!-- 検索・フィルタUI：scenarios.js が条件を読み取りカード一覧を絞り込み -->
    <div class="search-filter-panel" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: var(--card-bg, #fcfcfc);">
        <h3 style="margin-top: 0; margin-bottom: 10px; font-size: 16px;">検索・絞り込み</h3>
        
        <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px;">
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">キーワード (タイトル・作者名)</label>
                <input type="text" id="filter-keyword" placeholder="キーワードを入力" class="form-control" style="width: 100%;">
            </div>
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">システム</label>
                <select id="filter-system" class="form-control" style="width: 100%;">
                    <option value="">すべて</option>
                </select>
            </div>
        </div>

        <details class="search-details" style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 10px;">
            <summary style="cursor: pointer; font-weight: bold; color: var(--primary-color); outline: none; margin-bottom: 10px; user-select: none;">
                詳細検索を開く
            </summary>
            
            <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px;">
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">プレイ人数</label>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" id="filter-target-players" min="1" placeholder="例: 3" class="form-control" style="width: 100px;">
                        <span>人がプレイ可能</span>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">プレイ時間</label>
                    <select id="filter-play-time" class="form-control">
                        <option value="">制限なし</option>
                        <option value="120">2時間以内</option>
                        <option value="240">4時間以内</option>
                        <option value="360">6時間以内</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px;">
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">ロスト率</label>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-lost-rate" value="low"> 低 (low)
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-lost-rate" value="mid"> 中 (mid)
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-lost-rate" value="high"> 高 (high)
                        </label>
                    </div>
                </div>
            </div>

            <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px;">
                <div class="form-group" style="margin-bottom: 0; flex: 1;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">プレイスタイル傾向 (いずれかを含むOR検索)</label>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-trend" value="story"> 物語重視
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-trend" value="chaos"> 混沌歓迎
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-trend" value="avatar"> RP・没入
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-trend" value="clear"> 攻略重視
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-trend" value="harmony"> 協調重視
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="filter-trend" value="active"> 活躍推奨
                        </label>
                    </div>
                </div>
            </div>
        </details>
    </div>

    <!-- シナリオカード一覧：scenarios.js の主要な描画先 -->
    <section id="scenarios-list">
      <p>読み込み中…</p>
    </section>

    <footer>
        <hr />
        <small><a href="../index.html">Back to Home</a></small>
    </footer>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/init-supabase.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/scenarios.js"></script>
</body>
</html>
