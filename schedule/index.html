<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a href="../index.html">Home</a> |
      <a href="../character/index.html">Characters</a> |
      <a href="../sessions/index.html">Sessions</a> |
      <a href="../scenarios/index.html">Scenarios</a> |
      <a href="../schedule/index.html">Schedule</a> |
      <a href="../bbs/index.html">BBS</a>
    </nav>
    <hr />
    <h1>セッションカレンダー</h1>
      <p>予定管理用</p>

      <div class="calendar-toolbar">
        <button id="open-input-btn" class="primary-btn">予定入力</button>
        <button id="open-compare-btn" class="secondary-btn">予定比較</button>
      </div>

      <div id="compare-modal" class="modal">
        <div class="modal-content">
          <h3>比較するプレイヤーを選択</h3>
          <div id="player-checkbox-list" class="checkbox-list">
            </div>
          <div class="modal-actions">
            <button id="run-compare-btn" class="primary-btn">比較実行</button>
            <button onclick="closeModal('compare-modal')" class="secondary-btn">閉じる</button>
          </div>
        </div>
      </div>

      <div class="calendar-wrapper">
        <div class="calendar-header">
          <button id="prev-month-btn">◀ 先月</button>
          <h2 id="calendar-month-title">2026年 4月</h2>
          <button id="next-month-btn">来月 ▶</button>
        </div>

        <div class="calendar-grid" id="calendar-grid">
          <div class="calendar-day-header">日</div>
          <div class="calendar-day-header">月</div>
          <div class="calendar-day-header">火</div>
          <div class="calendar-day-header">水</div>
          <div class="calendar-day-header">木</div>
          <div class="calendar-day-header">金</div>
          <div class="calendar-day-header">土</div>
          
        </div>
      </div>

      <div id="availability-modal" class="modal" style="display: none;">
        <div class="modal-content">
          <h3 id="modal-date-title">予定の入力</h3>
          
          <div class="form-group">
            <label for="modal-player-id">プレイヤー</label>
            <select id="modal-player-id">
              </select>
          </div>

          <div class="form-group">
            <label for="modal-date">対象日</label>
            <input type="date" id="modal-date" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
          </div>

          <div class="form-group">
            <label for="modal-time-slot">時間帯</label>
            <select id="modal-time-slot">
              <option value="morning">朝</option>
              <option value="afternoon">昼</option>
              <option value="night" selected>夜</option>
              <option value="midnight">深夜</option>
            </select>
          </div>

          <div class="form-group">
            <label for="modal-status">ステータス</label>
            <select id="modal-status">
              <option value="ok">○ (空き)</option>
              <option value="maybe">△ (未定/調整可)</option>
              <option value="ng">× (不可)</option>
            </select>
          </div>

          <div class="modal-actions">
            <button id="save-availability-btn" class="primary-btn">保存</button>
            <button id="close-modal-btn" class="secondary-btn">キャンセル</button>
          </div>
        </div>
      </div>

  <footer>
    <hr />
    <small><a href="../index.html">Back to Home</a></small>
  </footer>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/schedule.js"></script>
</body>
</html>
