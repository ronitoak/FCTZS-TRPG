<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>卓の新規作成 | FCTZS TRPG部</title>
    <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
   <div class="container">
        <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
        <nav id="common-nav" class="top-nav"></nav>
        <hr />
        <h1>卓の新規作成</h1>

        <!-- 卓登録フォーム：session_create.js がシナリオ・GM・参加者候補を読み込み登録 -->
        <form id="session-form">
        <fieldset class="form-section">
            <legend>卓の基本情報</legend>
            <div class="profile-grid">
                <div class="form-group">
                    <label>卓名</label>
                    <input type="text" name="title" required class="form-control" placeholder="例：第1回、平日夜卓">
                </div>
                <div class="form-group">
                    <label>シナリオ</label>
                    <select name="scenario_id" id="scenario-select" required class="form-control">
                    <option value="">読み込み中...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>GM</label>
                    <select name="gm_id" id="gm-select" class="form-control" required>
                        <option value="">読み込み中...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>卓のカバー画像 (任意)</label>
                    <input type="file" id="image-file" accept="image/*" class="form-control">
                    <div id="image-preview-container" style="margin-top: 10px; display: none;">
                        <img id="image-preview" src="" style="max-width: 150px; max-height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                </div>
                <div class="form-group">
                    <label>追加プレイヤー (キャラ未作成など)</label>
                    <select name="extra_player_ids" id="extra-player-select" multiple class="form-control">
                    </select>
                    <small style="display:block; margin-top:4px; color:#666;">
                        ※Ctrl+クリックで複数選択 下からキャラを選んだらプレイヤーは選択不要
                    </small>
                </div>
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend>参加キャラクター選択</legend>
            <!-- 参加キャラクター候補：session_create.js がチェック項目を生成 -->
            <div id="character-selection-grid" class="skill-grid">
            <p>読み込み中...</p>
            </div>
        </fieldset>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn-primary">セッションを登録</button>
        </div>
        </form>

        <footer>
                <hr />
                <small><a href="../sessions/index.html">Back</a></small>
        </footer>
    </div>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/init-supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/session_create.js"></script>

</body>
</html>
