<!DOCTYPE html>
<html lang="ja">
<head>

</head>
<body>
   <div class="container">

            <a href="../index.html">Home</a> |

        <hr />
        <h1>卓の新規作成</h1>

        <form id="session-form">
        <fieldset class="form-section">
            <legend>卓の基本情報</legend>
            <div class="profile-grid">
            <div class="form-group">
                <label>卓名</label>
                <input type="text" name="title" required class="form-control" placeholder="例：第1回、平日夜卓">
            </div>
            <div class="form-group">
                <label>シナリオ</label>
                <select name="scenario_id" id="scenario-select" required class="form-control">
                <option value="">読み込み中...</option>
                </select>
            </div>
            <div class="form-group">
                <label>GM</label>
                <input type="text" name="gm" class="form-control" placeholder="GM名">
            </div>
            <div class="form-group">
            <label>プレイヤー (カンマ区切り)</label>
            <input type="text" name="extra_players" class="form-control" placeholder="">
        </div>
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend>参加キャラクター選択</legend>
            <div id="character-selection-grid" class="skill-grid">
            <p>読み込み中...</p>
            </div>
        </fieldset>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn-primary">セッションを登録</button>
        </div>
        </form>

        <footer>
                <hr />
                <small><a href="../sessions/index.html">Back</a></small>
        </footer>
    </div>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/init-supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/session_create.js"></script>

</body>
</html>
