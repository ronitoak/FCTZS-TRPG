<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sessions | FCTZS TRPG部</title>
  <link rel="icon" href="https://github.com/ronitoak/FCTZS-TRPG/blob/main/img/favicon.ico?raw=true" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
  <div class="container">
    <!-- 共通ナビゲーション：utils.js が画面共通の導線を描画 -->
    <nav id="common-nav" class="top-nav"></nav>
     <hr />
        <h1 style="display: flex; justify-content: space-between; align-items: center;">
            <span>セッションログ</span>
            <a href="./create.html" class="btn-primary" style="font-size: 14px; font-weight: bold;">新規追加</a>
        </h1>
        <p>セッション管理用</p>

    <!-- 検索・フィルタUI：sessions.js が条件を読み取り卓一覧を絞り込み -->
    <div class="search-filter-panel" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: var(--card-bg, #fcfcfc);">
        <h3 style="margin-top: 0; margin-bottom: 10px; font-size: 16px;">検索・絞り込み</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 15px;">
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">キーワード (タイトル・シナリオ・GM・PL)</label>
                <input type="text" id="filter-keyword" placeholder="キーワードを入力" class="form-control" style="width: 100%;">
            </div>
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 160px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">ステータス</label>
                <select id="filter-status" class="form-control" style="width: 100%;">
                    <option value="">すべて</option>
                    <option value="active">進行中</option>
                    <option value="planning">計画中</option>
                    <option value="done">終了済み</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 160px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">システム</label>
                <select id="filter-system" class="form-control" style="width: 100%;">
                    <option value="">すべて</option>
                </select>
            </div>
        </div>
    </div>

    <!-- セッションログ一覧：sessions.js が卓カードを描画 -->
    <section id="sessions-list">
      <p>読み込み中…</p>
    </section>

  <footer>
        <hr />
        <small><a href="../index.html">Back to Home</a></small>
  </footer>
  
  </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/init-supabase.js"></script>
  <script src="../js/site-config.js"></script>
    <script src="../js/utils.js"></script>
  <script src="../js/sessions.js"></script>
</body>

</html>
