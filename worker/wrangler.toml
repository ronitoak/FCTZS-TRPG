name = "fctzs-trpg" # 自分のWorker名に合わせて変更
main = "index.js"
compatibility_date = "2024-04-01"

# Discord埋め込み用フロントURLは Dashboard の vars で SITE_URL を設定する。
# 例: SITE_URL = "https://fctzs-trpg.pages.dev"

[triggers]
crons = ["0 3 * * *"]

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "fctzs-trpg-assets"
